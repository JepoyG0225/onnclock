<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Payslips - OnClock</title>
<style>
@font-face{
  font-family:'Montserrat';
  src:url('../assets/fonts/Montserrat-Regular.ttf') format('truetype');
  font-weight:400;font-style:normal;font-display:swap;
}
@font-face{
  font-family:'Montserrat';
  src:url('../assets/fonts/Montserrat-Bold.ttf') format('truetype');
  font-weight:700;font-style:normal;font-display:swap;
}
:root{
  --navy:#0d1b2a;--navy-mid:#1a2d42;--orange:#fa5e01;--bg:#eef2f7;--surface:#fff;
  --border:#e2e8f0;--border-mid:#cbd5e1;--text:#0f172a;--muted:#64748b;--subtle:#94a3b8;
  --radius:12px;--radius-sm:8px;--shadow-sm:0 1px 3px rgba(13,27,42,.07),0 1px 2px rgba(13,27,42,.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Montserrat',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
body{display:flex;flex-direction:column;overflow:hidden;}
.hdr{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);
  padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;flex-shrink:0;-webkit-app-region:drag;
}
.hdr-icon{width:30px;height:30px;border-radius:7px;background:var(--orange);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.hdr-icon img{width:100%;height:100%;object-fit:cover;}
.hdr-title{font-size:14px;font-weight:700;color:#fff;flex:1;}
.main{flex:1;overflow-y:auto;padding:16px 20px 24px;}
.main::-webkit-scrollbar{width:5px;}
.main::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:3px;}
.card{
  background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);
  padding:13px 14px;margin-bottom:10px;box-shadow:var(--shadow-sm);
}
.top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.title{font-size:13px;font-weight:700;color:var(--text);}
.meta{font-size:11px;color:var(--muted);margin-top:3px;}
.net{
  font-size:12px;font-weight:700;color:#1a2d42;background:rgba(26,45,66,.09);
  border-radius:var(--radius-sm);padding:5px 9px;white-space:nowrap;
}
.row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:10px;}
.cell{background:#f8fafc;border-radius:8px;padding:7px 8px;}
.lbl{font-size:10px;color:var(--subtle);}
.val{font-size:12px;font-weight:700;color:var(--text);margin-top:2px;}
.actions{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px;}
.dl-btn{
  border:1px solid var(--border-mid);background:#fff;color:var(--navy-mid);border-radius:8px;
  padding:7px 10px;font-size:11px;font-weight:700;cursor:pointer;
}
.dl-btn:hover{border-color:var(--orange);color:var(--orange);}
.dl-btn[disabled]{opacity:.6;cursor:not-allowed;}
.msg{font-size:10px;color:var(--muted);}
.msg.ok{color:#166534;}
.msg.err{color:#b91c1c;}
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:42px 16px;color:var(--subtle);}
.spin{display:inline-block;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-icon">
    <img src="../assets/icon.png" alt="" onerror="this.style.display='none'"/>
  </div>
  <div class="hdr-title">Payslips</div>
</div>

<div class="main">
  <div id="loading" class="state"><div class="spin" style="font-size:28px;">&#8635;</div><div>Loading payslips...</div></div>
  <div id="list"></div>
  <div id="empty" class="state" style="display:none;"><div style="font-size:36px;opacity:.35;">&#128179;</div><div>No payslips yet.</div></div>
</div>

<script>
'use strict'
const api = window.onclock

function peso(n){
  return new Intl.NumberFormat('en-PH',{style:'currency',currency:'PHP'}).format(Number(n||0))
}
function fmtDate(v){
  if(!v) return '-'
  const d=new Date(v)
  if(Number.isNaN(d.getTime())) return '-'
  return d.toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'})
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escAttr(s){return esc(s).replace(/"/g,'&quot;')}

async function downloadPdf(btn){
  const id = btn.getAttribute('data-id') || ''
  if(!id) return
  const msgEl = document.getElementById(`msg-${id}`)
  const prev = btn.textContent
  btn.disabled = true
  btn.textContent = 'Downloading...'
  if(msgEl){ msgEl.textContent=''; msgEl.className='msg' }
  try{
    const res = await api.downloadPayslipPdf(id)
    if(res?.ok){
      if(msgEl){ msgEl.textContent = 'Saved'; msgEl.className='msg ok' }
    }else if(res?.canceled){
      if(msgEl){ msgEl.textContent = 'Canceled'; msgEl.className='msg' }
    }else{
      if(msgEl){ msgEl.textContent = res?.error || 'Download failed'; msgEl.className='msg err' }
    }
  }catch{
    if(msgEl){ msgEl.textContent = 'Download failed'; msgEl.className='msg err' }
  }finally{
    btn.disabled = false
    btn.textContent = prev
  }
}

async function load(){
  const loading=document.getElementById('loading')
  const list=document.getElementById('list')
  const empty=document.getElementById('empty')
  loading.style.display='flex'
  list.innerHTML=''
  empty.style.display='none'
  try{
    const res=await api.getMyPayslips()
    const payslips=res?.data?.payslips||[]
    loading.style.display='none'
    if(!res?.ok || !payslips.length){
      empty.style.display='flex'
      return
    }
    list.innerHTML=payslips.map(ps=>`
      <div class="card">
        <div class="top">
          <div>
            <div class="title">${esc(ps.payrollRun?.periodLabel||'Payslip')}</div>
            <div class="meta">Pay date: ${fmtDate(ps.payrollRun?.payDate)}</div>
          </div>
          <div class="net">${peso(ps.netPay)}</div>
        </div>
        <div class="row">
          <div class="cell"><div class="lbl">Gross</div><div class="val">${peso(ps.grossPay)}</div></div>
          <div class="cell"><div class="lbl">Deductions</div><div class="val">${peso(ps.totalDeductions)}</div></div>
          <div class="cell"><div class="lbl">Days Worked</div><div class="val">${Number(ps.daysWorked||0)}</div></div>
        </div>
        <div class="actions">
          <button class="dl-btn" data-id="${escAttr(ps.id)}">Download PDF</button>
          <div class="msg" id="msg-${escAttr(ps.id)}"></div>
        </div>
      </div>
    `).join('')
    list.querySelectorAll('.dl-btn').forEach(btn=>{
      btn.addEventListener('click',()=>downloadPdf(btn))
    })
  }catch{
    loading.style.display='none'
    empty.style.display='flex'
  }
}

load()
</script>
</body>
</html>
