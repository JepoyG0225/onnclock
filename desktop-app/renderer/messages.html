<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Messages — OnClock</title>
<style>
@font-face{
  font-family:'Montserrat';
  src:url('../assets/fonts/Montserrat-Regular.ttf') format('truetype');
  font-weight:400;font-style:normal;font-display:swap;
}
@font-face{
  font-family:'Montserrat';
  src:url('../assets/fonts/Montserrat-Bold.ttf') format('truetype');
  font-weight:700;font-style:normal;font-display:swap;
}
:root{
  --navy:#0d1b2a;--navy-mid:#1a2d42;--navy-light:#2e4a6a;
  --orange:#fa5e01;--orange-dim:#c44d00;--orange-bg:#fff3eb;
  --green:#16a34a;--green-bg:#f0fdf4;--green-border:#bbf7d0;
  --red:#dc2626;--red-bg:#fef2f2;
  --bg:#eef2f7;--surface:#fff;--border:#e2e8f0;--border-mid:#cbd5e1;
  --text:#0f172a;--muted:#64748b;--subtle:#94a3b8;
  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Montserrat',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
body{display:flex;flex-direction:column;overflow:hidden;}

/* Header */
.hdr{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);
  padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;
  flex-shrink:0;-webkit-app-region:drag;
}
.hdr-icon{width:30px;height:30px;border-radius:7px;background:var(--orange);
  display:flex;align-items:center;justify-content:center;overflow:hidden;}
.hdr-icon img{width:100%;height:100%;object-fit:cover;}
.hdr-title{font-size:14px;font-weight:700;color:#fff;flex:1;}

/* Workspace */
.workspace{flex:1;display:flex;overflow:hidden;}

/* Sidebar */
.sidebar{
  width:264px;flex-shrink:0;background:var(--surface);
  border-right:1.5px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar-search{padding:12px 14px;border-bottom:1px solid var(--border);}
.search-inp{
  width:100%;border:1.5px solid var(--border);border-radius:20px;
  padding:7px 12px;font-size:12px;font-family:inherit;color:var(--text);
  background:var(--bg);outline:none;
}
.search-inp:focus{border-color:var(--orange);background:var(--surface);}
.sidebar-body{flex:1;overflow-y:auto;}
.sidebar-body::-webkit-scrollbar{width:4px;}
.sidebar-body::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:2px;}

.section-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px 6px;
}
.section-lbl{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--subtle);letter-spacing:.06em;}
.section-action{
  background:none;border:none;cursor:pointer;color:var(--subtle);font-size:18px;line-height:1;
  padding:2px 4px;border-radius:4px;transition:color .12s;-webkit-app-region:no-drag;
}
.section-action:hover{color:var(--orange);}

.conv-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;cursor:pointer;transition:background .1s;
  border-left:3px solid transparent;-webkit-app-region:no-drag;
}
.conv-item:hover{background:var(--bg);}
.conv-item.active{background:var(--orange-bg);border-left-color:var(--orange);}
.conv-avatar{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;position:relative;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;
}
.conv-avatar.dm{background:linear-gradient(135deg,var(--navy-mid),var(--navy-light));}
.conv-avatar.group{background:linear-gradient(135deg,#7c3aed,#a855f7);}
.online-dot{position:absolute;bottom:0;right:0;width:10px;height:10px;border-radius:50%;
  background:var(--green);border:2px solid var(--surface);}
.conv-body{flex:1;min-width:0;}
.conv-name{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.conv-last{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.conv-time{font-size:10px;color:var(--subtle);}
.unread-badge{background:var(--orange);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;}

/* Thread pane */
.thread-pane{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.thread-empty{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;color:var(--subtle);
}
.thread-empty-icon{font-size:48px;opacity:.25;}
.thread-empty-text{font-size:13px;}

.thread-hdr{
  background:var(--surface);border-bottom:1.5px solid var(--border);
  padding:0 18px;height:56px;display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.thread-avatar{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;position:relative;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;
}
.thread-avatar.dm{background:linear-gradient(135deg,var(--navy-mid),var(--navy-light));}
.thread-avatar.group{background:linear-gradient(135deg,#7c3aed,#a855f7);}
.thread-info{flex:1;min-width:0;}
.thread-name{font-size:14px;font-weight:700;color:var(--text);}
.thread-sub{font-size:11px;color:var(--muted);}

/* Messages list */
.msg-list{
  flex:1;overflow-y:auto;padding:14px 18px;
  display:flex;flex-direction:column;gap:2px;
}
.msg-list::-webkit-scrollbar{width:5px;}
.msg-list::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:3px;}

.date-sep{
  display:flex;align-items:center;gap:10px;margin:10px 0;
}
.date-sep span{font-size:10px;font-weight:700;color:var(--subtle);white-space:nowrap;}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border);}

.msg-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:4px;}
.msg-row.mine{flex-direction:row-reverse;}
.msg-row.theirs{flex-direction:row;}

.msg-sender-avatar{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#fff;
  background:linear-gradient(135deg,var(--navy-mid),var(--navy-light));
}
.msg-sender-avatar.hidden{visibility:hidden;}

.msg-col{display:flex;flex-direction:column;max-width:70%;gap:2px;}
.msg-row.mine .msg-col{align-items:flex-end;}
.msg-row.theirs .msg-col{align-items:flex-start;}

.msg-sender-name{font-size:10px;font-weight:700;color:var(--muted);padding:0 4px;margin-bottom:1px;}
.msg-bubble{
  padding:9px 13px;border-radius:16px;font-size:12px;line-height:1.5;word-break:break-word;
}
.msg-row.mine   .msg-bubble{background:var(--orange);color:#fff;border-radius:16px 16px 4px 16px;}
.msg-row.theirs .msg-bubble{background:var(--surface);border:1.5px solid var(--border);color:var(--text);border-radius:16px 16px 16px 4px;}
.msg-time{font-size:10px;color:var(--subtle);padding:0 4px;}

/* Input */
.thread-footer{
  background:var(--surface);border-top:1.5px solid var(--border);
  padding:10px 16px 12px;display:flex;align-items:flex-end;gap:10px;flex-shrink:0;
}
.msg-input{
  flex:1;border:1.5px solid var(--border);border-radius:22px;
  padding:9px 16px;font-size:13px;font-family:inherit;color:var(--text);
  background:var(--bg);outline:none;resize:none;line-height:1.4;max-height:120px;
}
.msg-input:focus{border-color:var(--orange);background:var(--surface);}
.send-btn{
  width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;
  background:var(--orange);color:#fff;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s;
}
.send-btn:hover{background:var(--orange-dim);}
.send-btn:disabled{opacity:.5;cursor:not-allowed;}

/* Loading / empty states */
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;padding:32px 16px;color:var(--subtle);}
.state-icon{font-size:32px;opacity:.35;}
.state-text{font-size:12px;text-align:center;}
.spin{display:inline-block;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<!-- Header -->
<div class="hdr">
  <div class="hdr-icon">
    <img src="../assets/icon.png" alt="" onerror="this.style.display='none'"/>
  </div>
  <div class="hdr-title">Messages</div>
</div>

<!-- Workspace -->
<div class="workspace">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-search">
      <input class="search-inp" id="search" type="text" placeholder="&#128269; Search conversations..."/>
    </div>
    <div class="sidebar-body" id="sidebar-body">
      <!-- Direct Messages -->
      <div class="section-hdr"><span class="section-lbl">Direct Messages</span></div>
      <div id="dm-list"><div class="state"><div class="spin" style="font-size:22px;">&#8635;</div></div></div>
      <!-- Groups -->
      <div class="section-hdr">
        <span class="section-lbl">Groups</span>
      </div>
      <div id="group-list"><div class="state"><div class="spin" style="font-size:22px;">&#8635;</div></div></div>
    </div>
  </div>

  <!-- Thread pane -->
  <div class="thread-pane" id="thread-pane">
    <div class="thread-empty" id="thread-empty">
      <div class="thread-empty-icon">&#128172;</div>
      <div class="thread-empty-text">Select a conversation to start messaging</div>
    </div>
    <div id="thread-active" style="display:none;flex:1;display:none;flex-direction:column;overflow:hidden;">
      <!-- Thread header -->
      <div class="thread-hdr">
        <div class="thread-avatar" id="t-avatar"></div>
        <div class="thread-info">
          <div class="thread-name" id="t-name"></div>
          <div class="thread-sub"  id="t-sub"></div>
        </div>
      </div>
      <!-- Messages -->
      <div class="msg-list" id="msg-list"></div>
      <!-- Input -->
      <div class="thread-footer">
        <textarea class="msg-input" id="msg-input" placeholder="Type a message…" rows="1"></textarea>
        <button class="send-btn" id="send-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M22 2L11 13M22 2L15 22 11 13 2 9z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
'use strict'
const api = window.onclock

let myUserId      = ''
let allDMs        = []
let allGroups     = []
let activeConv    = null  // { type:'dm'|'group', id, name, initials }
let msgPoller     = null
let searchQuery   = ''

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function initials(name){return(name||'?').split(' ').filter(Boolean).map(w=>w[0]).join('').slice(0,2).toUpperCase()}
function fmtTime(d){return new Date(d).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'})}
function fmtDate(d){
  const now=new Date(),dt=new Date(d)
  const diff=Math.floor((now-dt)/86400000)
  if(diff===0)return'Today'
  if(diff===1)return'Yesterday'
  return dt.toLocaleDateString('en-PH',{month:'short',day:'numeric'})
}
function isSameDay(a,b){
  const da=new Date(a),db=new Date(b)
  return da.getFullYear()===db.getFullYear()&&da.getMonth()===db.getMonth()&&da.getDate()===db.getDate()
}

// Search filter
document.getElementById('search').addEventListener('input',e=>{
  searchQuery=e.target.value.trim().toLowerCase()
  renderSidebar()
})

function renderSidebar(){
  renderDMs()
  renderGroups()
}

function renderDMs(){
  const el=document.getElementById('dm-list')
  const filtered=searchQuery?allDMs.filter(c=>(c.label||'').toLowerCase().includes(searchQuery)):allDMs
  if(!filtered.length){
    el.innerHTML='<div class="state"><div class="state-text">No direct messages</div></div>';return
  }
  el.innerHTML=filtered.map(c=>{
    const ini=initials(c.label)
    const active=activeConv?.type==='dm'&&activeConv.id===c.userId?'active':''
    const unread=c.unreadCount>0?`<span class="unread-badge">${c.unreadCount}</span>`:''
    const online=c.online?'<div class="online-dot"></div>':''
    const t=c.lastMessageAt?fmtDate(c.lastMessageAt):''
    return`<div class="conv-item ${active}" data-uid="${esc(c.userId)}" data-type="dm" data-name="${esc(c.label)}">
      <div class="conv-avatar dm">${ini}${online}</div>
      <div class="conv-body">
        <div class="conv-name">${esc(c.label)}</div>
        <div class="conv-last">${c.lastMessageByMe?'You: ':''}${esc(c.lastMessage||'No messages yet')}</div>
      </div>
      <div class="conv-meta">${t?`<div class="conv-time">${t}</div>`:''} ${unread}</div>
    </div>`
  }).join('')
  attachConvHandlers(el,'dm')
}

function renderGroups(){
  const el=document.getElementById('group-list')
  const filtered=searchQuery?allGroups.filter(g=>(g.name||'').toLowerCase().includes(searchQuery)):allGroups
  if(!filtered.length){
    el.innerHTML='<div class="state"><div class="state-text">No groups yet</div></div>';return
  }
  el.innerHTML=filtered.map(g=>{
    const ini=initials(g.name)
    const active=activeConv?.type==='group'&&activeConv.id===g.id?'active':''
    const unread=g.unreadCount>0?`<span class="unread-badge">${g.unreadCount}</span>`:''
    const t=g.lastMessageAt?fmtDate(g.lastMessageAt):''
    return`<div class="conv-item ${active}" data-uid="${esc(g.id)}" data-type="group" data-name="${esc(g.name)}" data-count="${g.memberCount||0}">
      <div class="conv-avatar group">${ini}</div>
      <div class="conv-body">
        <div class="conv-name">${esc(g.name)}</div>
        <div class="conv-last">${g.lastMessageByMe?'You: ':''}${esc(g.lastMessage||'No messages yet')}</div>
      </div>
      <div class="conv-meta">${t?`<div class="conv-time">${t}</div>`:''} ${unread}</div>
    </div>`
  }).join('')
  attachConvHandlers(el,'group')
}

function attachConvHandlers(container,type){
  container.querySelectorAll('.conv-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const id=el.dataset.uid,name=el.dataset.name
      const count=parseInt(el.dataset.count||'0')
      openConv({type,id,name,memberCount:count})
    })
  })
}

function openConv(conv){
  activeConv=conv
  renderSidebar()
  // Show thread pane
  document.getElementById('thread-empty').style.display='none'
  const ta=document.getElementById('thread-active')
  ta.style.display='flex'
  // Header
  const ini=initials(conv.name)
  const avEl=document.getElementById('t-avatar')
  avEl.textContent=ini
  avEl.className='thread-avatar '+(conv.type==='dm'?'dm':'group')
  document.getElementById('t-name').textContent=conv.name
  document.getElementById('t-sub').textContent=conv.type==='group'
    ?(conv.memberCount?`${conv.memberCount} members`:'Group')
    :'Direct Message'
  // Load messages
  document.getElementById('msg-list').innerHTML='<div class="state"><div class="spin" style="font-size:22px;">&#8635;</div></div>'
  loadMessages()
  startPoller()
  // Mark read
  try{ conv.type==='dm'?api.markDmRead(conv.id):api.markGroupRead(conv.id) }catch{}
}

async function loadMessages(){
  if(!activeConv)return
  try{
    const res=activeConv.type==='dm'
      ?await api.getChatMessages(activeConv.id)
      :await api.getGroupMessages(activeConv.id)
    if(!res.ok)return
    const msgs=res.data?.messages||[]
    renderMessages(msgs)
  }catch{}
}

function renderMessages(msgs){
  const el=document.getElementById('msg-list')
  if(!msgs.length){
    el.innerHTML='<div class="state"><div class="state-text">No messages yet. Say hello!</div></div>';return
  }
  let html=''
  let lastDate=null
  msgs.forEach((m,i)=>{
    const mine= activeConv.type==='dm'
      ? m.receiverUserId===activeConv.id  // sender is me
      : m.senderUserId===myUserId
    const msgDate=new Date(m.createdAt).toDateString()
    if(msgDate!==lastDate){
      html+=`<div class="date-sep"><span>${fmtDate(m.createdAt)}</span></div>`
      lastDate=msgDate
    }
    const time=fmtTime(m.createdAt)
    const senderName=m.senderName||(mine?'You':'')
    const ini=initials(senderName)
    // Show avatar only for first in a run from same sender
    const prevSame=i>0&&msgs[i-1].senderUserId===m.senderUserId&&!(!mine&&activeConv.type==='group')
    const avatarCls=mine||prevSame?'hidden':''
    if(mine){
      html+=`<div class="msg-row mine">
        <div class="msg-col">
          <div class="msg-bubble">${esc(m.body)}</div>
          <div class="msg-time">${time}</div>
        </div>
      </div>`
    }else{
      html+=`<div class="msg-row theirs">
        <div class="msg-sender-avatar ${avatarCls}">${avatarCls?'':ini}</div>
        <div class="msg-col">
          ${activeConv.type==='group'&&!prevSame?`<div class="msg-sender-name">${esc(senderName)}</div>`:''}
          <div class="msg-bubble">${esc(m.body)}</div>
          <div class="msg-time">${time}</div>
        </div>
      </div>`
    }
  })
  el.innerHTML=html
  el.scrollTop=el.scrollHeight
}

function startPoller(){stopPoller();msgPoller=setInterval(loadMessages,8000)}
function stopPoller(){clearInterval(msgPoller);msgPoller=null}

// Send
document.getElementById('send-btn').addEventListener('click',sendMsg)
document.getElementById('msg-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}
})
async function sendMsg(){
  const inp=document.getElementById('msg-input')
  const body=inp.value.trim()
  if(!body||!activeConv)return
  const btn=document.getElementById('send-btn')
  btn.disabled=true;inp.value=''
  try{
    const res=activeConv.type==='dm'
      ?await api.sendMessage({withUserId:activeConv.id,message:body})
      :await api.sendGroupMessage(activeConv.id,body)
    if(res.ok)loadMessages()
  }catch{}
  btn.disabled=false;inp.focus()
}

// Auto-grow textarea
document.getElementById('msg-input').addEventListener('input',function(){
  this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'
})

// Load initial data
async function init(){
  try{myUserId=await api.getUserId()||''}catch{}
  const[dmsRes,grpRes]=await Promise.allSettled([api.getChatContacts(),api.getGroups()])
  if(dmsRes.status==='fulfilled'&&dmsRes.value.ok){allDMs=dmsRes.value.data?.contacts||[]}
  if(grpRes.status==='fulfilled'&&grpRes.value.ok){allGroups=grpRes.value.data||[]}
  renderSidebar()
}
init()
</script>
</body>
</html>
